<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意大利旅游导览系统</title>
    <style>
        /* 基础样式规范 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; background-color: #fcfcfc; color: #333333; }
        h1 { text-align: center; color: #333; font-size: 24px; border-bottom: 2px solid #8b0000; padding-bottom: 10px;}
        
        /* 景点卡片组件样式 */
        .card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card h2 { text-align: center; color: #8b0000; font-size: 20px; margin-top: 0;}
        .card img { width: 100%; border-radius: 8px; }
        .card p { line-height: 1.6; font-size: 15px; color: #555; }
        
        /* 音频播放器样式 */
        .audio-player { margin-top: 15px; text-align: center; }
        audio { width: 100%; outline: none; }
        
        /* 系统状态提示样式 */
        #status-msg { text-align: center; color: #888; font-style: italic; }
    </style>
</head>
<body>
    <h1>意大利经典景点导览</h1>
    
    <div id="app">
        <p id="status-msg">正在连接后端接口加载数据...</p>
    </div>

    <script>
        // 异步函数：向 Python 接口发起 GET 请求
        async function fetchAttractions() {
            try {
                // 1. 发起网络请求 (请求目标为第五步本地运行的 Uvicorn 服务)
                const response = await fetch('https://italy-tour-api.onrender.com/api/attractions');
                const result = await response.json();

                // 2. 校验 HTTP 状态码
                if (result.status === 200) {
                    const container = document.getElementById('app');
                    container.innerHTML = ''; // 清除加载提示语

                    // 3. 遍历数据组，动态构建 DOM 节点
                    result.data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        // 使用模板字符串注入变量
                        card.innerHTML = `
                            <h2>${item.name}</h2>
                            <img src="${item.image_url}" alt="${item.name}">
                            <p><strong>所在城市：</strong>${item.city}</p>
                            <p>${item.description}</p>
                            <div class="audio-player">
                                <audio controls>
                                    <source src="${item.audio_url}" type="audio/mpeg">
                                </audio>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                // 异常处理：若后端未启动或跨域被拦截，输出错误日志
                console.error("API 接口调用失败:", error);
                document.getElementById('status-msg').innerHTML = 
                    '<span style="color:red;">数据获取失败。请检查 D 盘的 Python FastAPI 服务是否已启动运行。</span>';
            }
        }

        // 绑定生命周期：DOM 加载完成后立即执行数据抓取
        window.onload = fetchAttractions;
    </script>
</body>
</html>
