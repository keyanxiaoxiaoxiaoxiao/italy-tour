<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意大利旅游：罗马斗兽场</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fcfcfc;
            color: #333333;
        }
        h1 {
            text-align: center;
            color: #8b0000;
        }
        img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        p {
            line-height: 1.8;
            font-size: 16px;
        }
        /* 新增：播放器容器的样式，确保其与整体风格协调 */
        .audio-player {
            margin-top: 25px;
            text-align: center;
            background-color: #ffffff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        audio {
            width: 100%; /* 让播放器宽度适配手机屏幕 */
            outline: none;
        }
        .audio-hint {
            font-size: 14px;
            color: #888888;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>罗马斗兽场</h1>
    <img src="colosseum.jpg" alt="罗马斗兽场">
    
    <div class="audio-player">
        <audio controls>
            <source src="colosseum.mp3" type="audio/mpeg">
            您的浏览器不支持音频播放组件。
        </audio>
        <div class="audio-hint">🎧 点击播放景点语音导览</div>
    </div>
    
    <p>罗马斗兽场 (Colosseum) 是古罗马帝国专供奴隶主、贵族和自由民观看斗兽或奴隶角斗的地方，也是罗马的标志性建筑。站在这里，你仿佛还能听到两千年前角斗士的怒吼。</p>
</body>
</html>
